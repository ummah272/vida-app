<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Request System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            margin: 0;
        }

        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        .login-container img {
            width: 100px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .divider {
            margin: 30px 0;
            border-top: 1px solid #e0e0e0;
            position: relative;
        }

        .divider-text {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 10px;
            color: #666;
            font-size: 13px;
        }

        .signup-section {
            margin-top: 20px;
        }

        .signup-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }

        .signup-btn:hover {
            background-color: #218838;
        }

        .form-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <img src="{{ url_for('static', filename='logo/logo_sistem_2.png') }}" alt="Logo sistem">
        <h2>Login Request System</h2>
        
        <!-- LOGIN FORM -->
        <form method="POST">
            <div class="form-title">Silakan login dengan akun Anda</div>
            
            <label for="role">Login sebagai:</label>
            <select name="role" id="role">
                <option value="Bea Cukai">Bea Cukai</option>
                <option value="Gate Superintendent">Gate Superintendent</option>
            </select>

            <input type="email" name="email" id="email" placeholder="Email" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            
            <button type="submit">🔐 Login</button>
        </form>

        <!-- SIGNUP SECTION -->
        <div class="divider">
            <div class="divider-text">atau</div>
        </div>

        <div class="signup-section">
            <div class="signup-text">📝 Belum punya akun?</div>
            <a href="/signup" class="signup-btn">Daftar Akun Baru</a>
        </div>
    </div>
</body>

</html>
